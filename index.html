<!doctype html>
<html lang="en">

<head>
  <script>
    (function() {
      const CURRENT_VERSION = 'v2.2.0-ultimate-security';
      const storedVersion = localStorage.getItem('app_version');
      if (storedVersion !== CURRENT_VERSION) {
        // Show a temporary "System Recovery" message to the user
        document.body.innerHTML = `
          <div style="background:#020410; color:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; text-align:center; padding:20px;">
            <div style="font-size:40px; margin-bottom:20px;">🧬</div>
            <h1 style="font-size:24px; margin-bottom:10px;">ULTIMATE SECURITY UPDATE V2.2.0</h1>
            <p style="color:#a1a1aa; max-width:400px; line-height:1.6;">Applying absolute cache recovery... Clearing old data and locking security protocols. We will be back in 1 second.</p>
          </div>
        `;
        localStorage.setItem('app_version', CURRENT_VERSION);
        // Force a hard reload from the server
        setTimeout(() => {
          window.location.reload(true);
        }, 800);
      }
    })();
  </script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stake-To-Done Protocol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
